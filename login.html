<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Navro Capital</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0F2B4C">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-56VB002HDN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-56VB002HDN');
  </script>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <a href="index.html" class="navbar-logo" style="justify-content: center; font-size: 1.5rem;">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 40px;"><rect width="36" height="36" rx="8" fill="currentColor" fill-opacity="0.12"/><path d="M10 26V10h3l7 10.5V10h3v16h-3L13 15.5V26h-3z" fill="currentColor"/></svg>
          Navro Capital
        </a>
      </div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">Sign in to manage Market Insights</p>

      <div class="login-error" id="loginError">Invalid username or password</div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="loginBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--slate-400);">
        <a href="index.html" style="color: var(--emerald); text-decoration: none; font-weight: 500;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
