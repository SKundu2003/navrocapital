<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Navro Capital</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://navrocapital.in/login">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://navrocapital.in/login">
  <meta property="og:title" content="Admin Login — Navro Capital">
  <meta property="og:description" content="Admin login for Navro Capital.">
  <meta property="og:site_name" content="Navro Capital">
  <meta name="theme-color" content="#0F2B4C">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W0PDM9Z6QC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-W0PDM9Z6QC');
  </script>
</head>
<body>

  <div class="login-container" id="loginWrapper">
    <div class="login-card" id="loginCard">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <a href="index.html" class="navbar-logo" style="justify-content: center; font-size: 1.5rem;">
          Navro Capital
        </a>
      </div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">Sign in to manage Market Insights</p>

      <div class="login-error" id="loginError">Invalid username or password</div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="loginBtn">
          Sign In
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--slate-400);">
        <a href="index.html" style="color: var(--emerald); text-decoration: none; font-weight: 500;">← Back to Home</a>
      </p>
    </div>

    <!-- Dashboard UI -->
    <div class="dashboard-card" id="dashboardCard" style="display: none; background: white; padding: 2.5rem; border-radius: 1rem; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--slate-200); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h2>Admin Dashboard</h2>
            <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
        </div>
        <div class="form-group">
            <label style="font-weight: 600; color: var(--slate-900);">Edit Market Insights (Home Page)</label>
            <textarea id="adminInsightTextarea" rows="6" style="width: 100%; border: 1px solid var(--slate-300); border-radius: 0.5rem; padding: 1rem; margin-top: 0.5rem; font-family: inherit; font-size: 1rem;"></textarea>
        </div>
        <button id="adminInsightSave" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Save Changes</button>
        <p id="saveMsg" style="color: var(--emerald-dark); margin-top: 1rem; text-align: center; display: none; font-weight: 500;">Changes saved successfully!</p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
